name: Record Daily Close & Anomalies

# 定期実行はGoogle Apps Script（gas/dailyClose.gs、時間主導トリガー・日付ベース・午前6〜7時）に
# 移行済み。GitHub Actionsのcron scheduleは無料枠だとベストエフォートで発火が安定しないため、
# これは手動実行用のフォールバックとして残す。
on:
  workflow_dispatch: {}

jobs:
  record-daily-close:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Record daily close and recompute anomalies
        working-directory: scripts
        env:
          CURRENCYFREAKS_API_KEY_1: ${{ secrets.CURRENCYFREAKS_API_KEY_1 }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node record-daily-close.js
