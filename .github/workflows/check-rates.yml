name: Check FX Rates

# 定期実行はGoogle Apps Script（gas/checkRates.gs、時間主導トリガー15分ごと）に移行済み。
# GitHub Actionsのcron scheduleは無料枠だとベストエフォートで2〜3時間に1回程度しか
# 発火しないため定期実行には使えなくなった。これは手動実行用のフォールバックとして残す。
on:
  workflow_dispatch: {}

jobs:
  check-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Run rate check
        working-directory: scripts
        env:
          CURRENCYFREAKS_API_KEY_1: ${{ secrets.CURRENCYFREAKS_API_KEY_1 }}
          CURRENCYFREAKS_API_KEY_2: ${{ secrets.CURRENCYFREAKS_API_KEY_2 }}
          CURRENCYFREAKS_API_KEY_3: ${{ secrets.CURRENCYFREAKS_API_KEY_3 }}
          CURRENCYFREAKS_API_KEY_4: ${{ secrets.CURRENCYFREAKS_API_KEY_4 }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node check-rates.js
