name: Check FX Rates

on:
  schedule:
    # 4キーローテーション・15分間隔（fx-alert-spec.md 11章）
    # 毎時 :03/:18/:33/:48 に実行（UTC基準。GitHub Actionsのcronは数分遅延することがあります）
    # 月〜金（UTC）は終日稼働
    - cron: "3,18,33,48 * * * 1-5"
    # 日曜22-23時(UTC)＝月曜7-8時台(JST、シドニー/東京市場の早朝オープン分)もカバー
    - cron: "3,18,33,48 22,23 * * 0"
  workflow_dispatch: {}
    # ↑ Actionsタブから手動実行もできるようにしておく（動作確認用）

jobs:
  check-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Run rate check
        working-directory: scripts
        env:
          CURRENCYFREAKS_API_KEY_1: ${{ secrets.CURRENCYFREAKS_API_KEY_1 }}
          CURRENCYFREAKS_API_KEY_2: ${{ secrets.CURRENCYFREAKS_API_KEY_2 }}
          CURRENCYFREAKS_API_KEY_3: ${{ secrets.CURRENCYFREAKS_API_KEY_3 }}
          CURRENCYFREAKS_API_KEY_4: ${{ secrets.CURRENCYFREAKS_API_KEY_4 }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node check-rates.js
